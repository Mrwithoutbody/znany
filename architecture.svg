  <rect x="775" y="1036" width="14" height="14" rx="3" fill="#0f766e"/>
  <text x="795" y="1048" font-size="11" fill="#3a3833">Sieć / LTV</text>
  <rect x="890" y="1036" width="14" height="14" rx="3" fill="#44403c"/>
