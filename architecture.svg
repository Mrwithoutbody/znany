<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
    <linearGradient id="gw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="fin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="srv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="con" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="mkt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="integ" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64748b"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" rx="16" fill="#f8fafc"/>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">AutoHub — Architektura mikroserwisow</text>

  <!-- API Gateway -->
  <rect x="420" y="65" width="360" height="56" rx="12" fill="url(#gw)" filter="url(#shadow)"/>
  <text x="600" y="98" text-anchor="middle" font-size="16" font-weight="600" fill="#fff">API Gateway + Auth</text>
  <text x="600" y="113" text-anchor="middle" font-size="11" fill="#94a3b8">User &amp; Auth  |  Routing  |  Rate Limiting</text>

  <!-- Connector from GW down -->
  <line x1="600" y1="121" x2="600" y2="150" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="600" y1="150" x2="200" y2="150" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="600" y1="150" x2="1000" y2="150" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Vertical drops -->
  <line x1="200" y1="150" x2="200" y2="170" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="600" y1="150" x2="600" y2="170" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="1000" y1="150" x2="1000" y2="170" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- ===== ROW 1 ===== -->

  <!-- Vehicle Registry -->
  <rect x="60" y="170" width="280" height="90" rx="12" fill="url(#core)" filter="url(#shadow)"/>
  <text x="200" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Vehicle Registry</text>
  <text x="200" y="218" text-anchor="middle" font-size="10.5" fill="#bfdbfe">VIN decode | Dane techniczne</text>
  <text x="200" y="232" text-anchor="middle" font-size="10.5" fill="#bfdbfe">Cyfrowa ksiazka serwisowa</text>
  <text x="200" y="246" text-anchor="middle" font-size="10.5" fill="#bfdbfe">Indeks zdrowia pojazdu</text>

  <!-- Finance Tracker -->
  <rect x="460" y="170" width="280" height="90" rx="12" fill="url(#fin)" filter="url(#shadow)"/>
  <text x="600" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Finance Tracker</text>
  <text x="600" y="218" text-anchor="middle" font-size="10.5" fill="#d1fae5">Wszystkie wydatki | Podatek</text>
  <text x="600" y="232" text-anchor="middle" font-size="10.5" fill="#d1fae5">Leasing / finansowanie</text>
  <text x="600" y="246" text-anchor="middle" font-size="10.5" fill="#d1fae5">Codzienna wycena pojazdu</text>

  <!-- Accident Assistant -->
  <rect x="860" y="170" width="280" height="90" rx="12" fill="url(#acc)" filter="url(#shadow)"/>
  <text x="1000" y="200" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Accident Assistant</text>
  <text x="1000" y="218" text-anchor="middle" font-size="10.5" fill="#fecaca">Prowadzony tryb szkody</text>
  <text x="1000" y="232" text-anchor="middle" font-size="10.5" fill="#fecaca">Zabezpieczenie dowodow</text>
  <text x="1000" y="246" text-anchor="middle" font-size="10.5" fill="#fecaca">Szkic wypadku | Uczestnicy</text>

  <!-- Connectors Row 1 → Row 2 -->
  <line x1="200" y1="260" x2="200" y2="290" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="600" y1="260" x2="600" y2="290" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="1000" y1="260" x2="1000" y2="290" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ===== ROW 2 ===== -->

  <!-- Document Vault -->
  <rect x="60" y="290" width="280" height="90" rx="12" fill="url(#core)" filter="url(#shadow)"/>
  <text x="200" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Document Vault</text>
  <text x="200" y="338" text-anchor="middle" font-size="10.5" fill="#bfdbfe">Archiwum faktur i dokumentow</text>
  <text x="200" y="352" text-anchor="middle" font-size="10.5" fill="#bfdbfe">Szablony umow | OCR</text>
  <text x="200" y="366" text-anchor="middle" font-size="10.5" fill="#bfdbfe">Polisy | Dowody rejestracyjne</text>

  <!-- Insurance Hub -->
  <rect x="460" y="290" width="280" height="90" rx="12" fill="url(#fin)" filter="url(#shadow)"/>
  <text x="600" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Insurance Hub</text>
  <text x="600" y="338" text-anchor="middle" font-size="10.5" fill="#d1fae5">Porownywarka ubezpieczen</text>
  <text x="600" y="352" text-anchor="middle" font-size="10.5" fill="#d1fae5">Zawarcie polisy w app</text>
  <text x="600" y="366" text-anchor="middle" font-size="10.5" fill="#d1fae5">Auto-zmiana ubezpieczyciela</text>

  <!-- Workshop Finder -->
  <rect x="860" y="290" width="280" height="90" rx="12" fill="url(#srv)" filter="url(#shadow)"/>
  <text x="1000" y="320" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Workshop Finder</text>
  <text x="1000" y="338" text-anchor="middle" font-size="10.5" fill="#fef3c7">Wyszukiwarka z opiniami</text>
  <text x="1000" y="352" text-anchor="middle" font-size="10.5" fill="#fef3c7">Porownanie cen napraw</text>
  <text x="1000" y="366" text-anchor="middle" font-size="10.5" fill="#fef3c7">Anomaly detection kosztow</text>

  <!-- Connectors Row 2 → Row 3 -->
  <line x1="200" y1="380" x2="200" y2="410" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="600" y1="380" x2="600" y2="410" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="1000" y1="380" x2="1000" y2="410" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ===== ROW 3 ===== -->

  <!-- Vehicle Connect -->
  <rect x="60" y="410" width="280" height="90" rx="12" fill="url(#con)" filter="url(#shadow)"/>
  <text x="200" y="440" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Vehicle Connect</text>
  <text x="200" y="458" text-anchor="middle" font-size="10.5" fill="#ddd6fe">GPS tracker | Diagnostyka</text>
  <text x="200" y="472" text-anchor="middle" font-size="10.5" fill="#ddd6fe">API producentow | OBD</text>
  <text x="200" y="486" text-anchor="middle" font-size="10.5" fill="#ddd6fe">Cyfrowy kluczyk</text>

  <!-- Fuel & Energy -->
  <rect x="460" y="410" width="280" height="90" rx="12" fill="url(#fin)" filter="url(#shadow)"/>
  <text x="600" y="440" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Fuel &amp; Energy</text>
  <text x="600" y="458" text-anchor="middle" font-size="10.5" fill="#d1fae5">Porownywarka stacji paliw</text>
  <text x="600" y="472" text-anchor="middle" font-size="10.5" fill="#d1fae5">Karta paliwowa DKV/UTA</text>
  <text x="600" y="486" text-anchor="middle" font-size="10.5" fill="#d1fae5">Apple Pay | Rejestr tankowan</text>

  <!-- Reminders & Scheduling -->
  <rect x="860" y="410" width="280" height="90" rx="12" fill="url(#srv)" filter="url(#shadow)"/>
  <text x="1000" y="440" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Reminders &amp; Scheduling</text>
  <text x="1000" y="458" text-anchor="middle" font-size="10.5" fill="#fef3c7">Opony | Klimatyzacja | TUV</text>
  <text x="1000" y="472" text-anchor="middle" font-size="10.5" fill="#fef3c7">Auto-umawianie terminow</text>
  <text x="1000" y="486" text-anchor="middle" font-size="10.5" fill="#fef3c7">Sync kalendarza</text>

  <!-- Connectors Row 3 → Row 4 -->
  <line x1="200" y1="500" x2="200" y2="530" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="600" y1="500" x2="600" y2="530" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="1000" y1="500" x2="1000" y2="530" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ===== ROW 4 ===== -->

  <!-- Fleet Management -->
  <rect x="60" y="530" width="280" height="90" rx="12" fill="url(#con)" filter="url(#shadow)"/>
  <text x="200" y="560" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Fleet Management</text>
  <text x="200" y="578" text-anchor="middle" font-size="10.5" fill="#ddd6fe">Zarzadzanie flota</text>
  <text x="200" y="592" text-anchor="middle" font-size="10.5" fill="#ddd6fe">Przypisanie osob do pojazdow</text>
  <text x="200" y="606" text-anchor="middle" font-size="10.5" fill="#ddd6fe">Przekazanie pojazdu</text>

  <!-- Community -->
  <rect x="460" y="530" width="280" height="90" rx="12" fill="url(#mkt)" filter="url(#shadow)"/>
  <text x="600" y="560" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Community</text>
  <text x="600" y="578" text-anchor="middle" font-size="10.5" fill="#fce7f3">Reddit dla samochodow</text>
  <text x="600" y="592" text-anchor="middle" font-size="10.5" fill="#fce7f3">Porady prawne | Q&amp;A</text>
  <text x="600" y="606" text-anchor="middle" font-size="10.5" fill="#fce7f3">Forum per typ auta</text>

  <!-- DIY Assistant + Roadside -->
  <rect x="860" y="530" width="280" height="90" rx="12" fill="url(#srv)" filter="url(#shadow)"/>
  <text x="1000" y="560" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">DIY &amp; Roadside</text>
  <text x="1000" y="578" text-anchor="middle" font-size="10.5" fill="#fef3c7">Poradniki wideo per model</text>
  <text x="1000" y="592" text-anchor="middle" font-size="10.5" fill="#fef3c7">Pierwsza pomoc | Holowanie</text>
  <text x="1000" y="606" text-anchor="middle" font-size="10.5" fill="#fef3c7">Auta zastepcze</text>

  <!-- Connectors Row 4 → Row 5 -->
  <line x1="200" y1="620" x2="600" y2="660" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="600" y1="620" x2="600" y2="660" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="1000" y1="620" x2="600" y2="660" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ===== ROW 5 — Marketplace ===== -->

  <rect x="380" y="660" width="440" height="80" rx="12" fill="url(#mkt)" filter="url(#shadow)"/>
  <text x="600" y="690" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Marketplace</text>
  <text x="600" y="708" text-anchor="middle" font-size="10.5" fill="#fce7f3">Sprzedaz auta | Sklep akcesoriow | Serwis rejestracyjny</text>
  <text x="600" y="722" text-anchor="middle" font-size="10.5" fill="#fce7f3">mobile.de | Autoscout | wirkaufendeinauto</text>

  <!-- Connector Row 5 → Row 6 -->
  <line x1="600" y1="740" x2="600" y2="770" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- ===== ROW 6 — Integration Hub ===== -->

  <rect x="260" y="770" width="680" height="80" rx="12" fill="url(#integ)" filter="url(#shadow)"/>
  <text x="600" y="800" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Integration Hub</text>
  <text x="600" y="818" text-anchor="middle" font-size="10.5" fill="#cbd5e1">DKV/UTA | blitzer.de | billiger-mietwagen.de | OEM APIs</text>
  <text x="600" y="832" text-anchor="middle" font-size="10.5" fill="#cbd5e1">Google/Apple Calendar | Apple Pay | OCR Provider</text>

  <!-- Legend -->
  <rect x="40" y="860" width="14" height="14" rx="3" fill="#3b82f6"/>
  <text x="60" y="872" font-size="11" fill="#475569">Core Platform</text>
  <rect x="170" y="860" width="14" height="14" rx="3" fill="#10b981"/>
  <text x="190" y="872" font-size="11" fill="#475569">Finanse</text>
  <rect x="270" y="860" width="14" height="14" rx="3" fill="#f59e0b"/>
  <text x="290" y="872" font-size="11" fill="#475569">Serwis</text>
  <rect x="370" y="860" width="14" height="14" rx="3" fill="#ef4444"/>
  <text x="390" y="872" font-size="11" fill="#475569">Wypadki</text>
  <rect x="480" y="860" width="14" height="14" rx="3" fill="#8b5cf6"/>
  <text x="500" y="872" font-size="11" fill="#475569">Connected Car</text>
  <rect x="620" y="860" width="14" height="14" rx="3" fill="#ec4899"/>
  <text x="640" y="872" font-size="11" fill="#475569">Marketplace</text>
  <rect x="760" y="860" width="14" height="14" rx="3" fill="#64748b"/>
  <text x="780" y="872" font-size="11" fill="#475569">Integracje</text>
</svg>