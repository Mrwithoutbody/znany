  <text x="640" y="602" text-anchor="middle" font-size="10.5" fill="#fde68a">Wyzwanie dzień po dniu</text>
  <text x="640" y="617" text-anchor="middle" font-size="10.5" fill="#fde68a">Jawne autorstwo (influ./specj.)</text>

  <rect x="835" y="540" width="330" height="90" rx="12" fill="url(#app)" filter="url(#shadow)"/>
