  <!-- Background -->
  <rect width="1280" height="1080" rx="16" fill="#f7f4ee"/>

  <!-- Title -->
  <text x="640" y="46" text-anchor="middle" font-size="24" font-weight="700" fill="#0a0a08">znany.pl — Architektura mikroserwisów</text>
  <text x="640" y="70" text-anchor="middle" font-size="12.5" fill="#8a857c">Tworzenie → [Compliance] → Landing → App → Sieć/LTV   ·   warstwa Tworzenie ma 2 tryby: PILOT (ręczny) i SKALA (kreator)</text>

  <!-- ===== GATEWAY ===== -->
  <rect x="390" y="95" width="500" height="58" rx="12" fill="url(#gw)" filter="url(#shadow)"/>
  <text x="640" y="121" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">API Gateway + Tożsamość (multi-tenant)</text>
  <text x="640" y="139" text-anchor="middle" font-size="11" fill="#a8a29e">Klient · Specjalista · Influencer · Operator   |   Auth · Routing · Rate limit</text>

  <!-- Fan to band 01 (2 tryby) -->
  <line x1="640" y1="153" x2="640" y2="176" stroke="#a8a29e" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="375" y1="176" x2="905" y2="176" stroke="#a8a29e" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="375" y1="176" x2="375" y2="220" stroke="#a8a29e" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="905" y1="176" x2="905" y2="220" stroke="#a8a29e" stroke-width="2" stroke-dasharray="6,3"/>

