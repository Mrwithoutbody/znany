  <rect x="110" y="200" width="1060" height="110" rx="14" fill="#5c6b32" fill-opacity="0.05" stroke="#5c6b32" stroke-opacity="0.25" stroke-dasharray="4,4"/>
  <text x="375" y="214" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="1" fill="#44521f">PILOT — operator składa ręcznie</text>
  <text x="905" y="214" text-anchor="middle" font-size="10.5" font-weight="700" letter-spacing="1" fill="#44521f">SKALA — self-serve (po 3–5 projektach)</text>

  <rect x="175" y="220" width="400" height="82" rx="12" fill="url(#studio)" filter="url(#shadow)"/>
  <text x="375" y="246" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Treść projektu</text>
  <text x="375" y="265" text-anchor="middle" font-size="10.5" fill="#ecf0d8">Structured doc (jak data.js w satelitach)</text>
  <text x="375" y="280" text-anchor="middle" font-size="10.5" fill="#ecf0d8">Operator / specjalista wypełnia treść</text>
  <text x="375" y="295" text-anchor="middle" font-size="10.5" fill="#ecf0d8">Bez kreatora — makieta.html to dowód</text>

  <rect x="705" y="220" width="400" height="82" rx="12" fill="url(#studio)" filter="url(#shadow)"/>
  <rect x="705" y="220" width="400" height="82" rx="12" fill="none" stroke="#fff" stroke-opacity="0.55" stroke-width="1.5" stroke-dasharray="7,4"/>
