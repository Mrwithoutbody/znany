  <text x="905" y="265" text-anchor="middle" font-size="10.5" fill="#ecf0d8">No-code: bloki, szablony, treść w jednym</text>
  <text x="905" y="280" text-anchor="middle" font-size="10.5" fill="#ecf0d8">Specjalista buduje sam, podgląd live</text>
  <text x="905" y="295" text-anchor="middle" font-size="10.5" fill="#ecf0d8">Włącza się dopiero przy gęstości</text>

