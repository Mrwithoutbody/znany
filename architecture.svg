  <rect x="95" y="200" width="6" height="110" rx="3" fill="#5c6b32"/>
  <text x="45" y="455" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="2" fill="#c2410c" transform="rotate(-90 45 455)">02 · SPRZEDAŻ</text>
  <rect x="95" y="410" width="6" height="90" rx="3" fill="#c2410c"/>
  <text x="45" y="585" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="2" fill="#a16207" transform="rotate(-90 45 585)">03 · DOSTARCZENIE</text>
  <rect x="95" y="540" width="6" height="90" rx="3" fill="#a16207"/>
  <text x="45" y="715" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="2" fill="#0f766e" transform="rotate(-90 45 715)">04 · SIEĆ / LTV</text>
