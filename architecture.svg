  <text x="640" y="847" text-anchor="middle" font-size="10.5" fill="#d6d3d1">Co kupuje klient po kursie (moat)</text>
  <text x="640" y="862" text-anchor="middle" font-size="10.5" fill="#d6d3d1">LTV, retencja, kohorty</text>
  <text x="640" y="877" text-anchor="middle" font-size="10.5" fill="#d6d3d1">Baza decyzyjna pod kolejne projekty</text>

  <rect x="835" y="800" width="330" height="90" rx="12" fill="url(#ops)" filter="url(#shadow)"/>
  <text x="1000" y="828" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">Operacje Studio</text>
  <text x="1000" y="847" text-anchor="middle" font-size="10.5" fill="#d6d3d1">Panel operatora znany.pl</text>
  <text x="1000" y="862" text-anchor="middle" font-size="10.5" fill="#d6d3d1">Support / helpdesk, refundy</text>
  <text x="1000" y="877" text-anchor="middle" font-size="10.5" fill="#d6d3d1">Zarządzanie projektami i splitami</text>

