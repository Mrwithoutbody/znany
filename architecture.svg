  <text x="1000" y="732" text-anchor="middle" font-size="10.5" fill="#99f6e4">Dostępność partnerów</text>
  <text x="1000" y="747" text-anchor="middle" font-size="10.5" fill="#99f6e4">Sync kalendarza</text>

